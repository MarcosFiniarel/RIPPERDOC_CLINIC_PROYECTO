spring.application.name=cyber-ciberware-service
server.port=8082

spring.datasource.url=jdbc:mysql://localhost:3306/db_RIPPERDOC_CLINIC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# CONFIGURACIÓN DE SWAGGER / OPENAPI

# Habilitar los endpoints de la documentación técnica
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Ruta del JSON interno (Firma digital para el API Gateway)
springdoc.api-docs.path=/ciberware-service/v2/api-docs

# Ruta de acceso visual en el navegador
springdoc.swagger-ui.path=/doc/ciberware-service.html

# Ordenamiento alfabético automático en la UI
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha