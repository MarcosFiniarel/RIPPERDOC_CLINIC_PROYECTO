spring.datasource.url=jdbc:mysql://localhost:3306/db_RIPPERDOC_CLINIC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

cyber-finance-service.url = http://localhost:8084/api/v1/billeteras
cyber-maxtac-service.url = http://localhost:8087/api/v1/alertas

# CONFIGURACIÓN DE SWAGGER / OPENAPI

# Habilitar los endpoints de la documentación técnica
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Ruta del JSON interno (Firma digital para el API Gateway)
springdoc.api-docs.path=/patient-service/v2/api-docs

# Ruta de acceso visual en el navegador
springdoc.swagger-ui.path=/doc/patient-service.html

# Ordenamiento alfabético automático en la UI
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha