spring.application.name=cyber-sale-service
server.port=8083

spring.datasource.url=jdbc:mysql://localhost:3306/db_RIPPERDOC_CLINIC
spring.datasource.username=root
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

#Url base
cyber-ciberware-service.url = http://localhost:8082/api/v1/ciberware
cyber-patient-service.url = http://localhost:8081/api/v1/paciente
cyber-surgery-service.url = http://localhost:8085/api/v1/cirugias
cyber-finance-service.url = http://localhost:8084/api/v1/transacciones

# CONFIGURACIÓN DE SWAGGER / OPENAPI

# Habilitar los endpoints de la documentación técnica
springdoc.api-docs.enabled=true
springdoc.swagger-ui.enabled=true

# Ruta del JSON interno (Firma digital para el API Gateway)
springdoc.api-docs.path=/sale-service/v2/api-docs

# Ruta de acceso visual en el navegador
springdoc.swagger-ui.path=/doc/sale-service.html

# Ordenamiento alfabético automático en la UI
springdoc.swagger-ui.operationsSorter=alpha
springdoc.swagger-ui.tagsSorter=alpha